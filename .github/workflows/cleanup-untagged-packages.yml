name: Cleanup Untagged Packages

on:
  schedule:
    - cron: "0 1 * * *" # Runs daily at 01:00 UTC
  workflow_dispatch:

jobs:
  cleanup-ghcr-untagged:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Delete untagged GHCR package versions
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const org = context.repo.owner;
            const packageType = "container";
            const perPage = 100;

            async function paginate(request) {
              const results = [];
              let page = 1;

              while (true) {
                const response = await request(page);
                results.push(...response.data);

                if (response.data.length < perPage) {
                  break;
                }

                page += 1;
              }

              return results;
            }

            const packages = await paginate((page) =>
              github.request("GET /orgs/{org}/packages", {
                org,
                package_type: packageType,
                per_page: perPage,
                page,
              })
            );

            if (packages.length === 0) {
              core.info(`No ${packageType} packages found in ${org}.`);
              return;
            }

            core.info(`Found ${packages.length} ${packageType} packages in ${org}.`);

            let deletedVersions = 0;

            for (const pkg of packages) {
              const versions = await paginate((page) =>
                github.request("GET /orgs/{org}/packages/{package_type}/{package_name}/versions", {
                  org,
                  package_type: packageType,
                  package_name: pkg.name,
                  per_page: perPage,
                  page,
                })
              );

              // Collect digests that are protected: tagged versions + their manifest list children
              const protectedDigests = new Set();
              for (const v of versions) {
                const tags = v.metadata?.container?.tags || [];
                if (tags.length > 0) {
                  // The version name is the digest (sha256:...)
                  protectedDigests.add(v.name);
                }
              }

              // Fetch manifest lists from GHCR registry to find child digests of multi-arch tagged versions
              const token = process.env.GITHUB_TOKEN || '';
              const basicAuth = Buffer.from(`USERNAME:${token}`).toString('base64');
              for (const v of versions) {
                const tags = v.metadata?.container?.tags || [];
                if (tags.length === 0) continue;
                for (const tag of tags) {
                  try {
                    const res = await fetch(
                      `https://ghcr.io/v2/${org}/${pkg.name}/manifests/${tag}`,
                      {
                        headers: {
                          Authorization: `Basic ${basicAuth}`,
                          Accept: [
                            'application/vnd.oci.image.index.v1+json',
                            'application/vnd.docker.distribution.manifest.list.v2+json',
                            'application/vnd.docker.distribution.manifest.v2+json',
                          ].join(', '),
                        },
                      }
                    );
                    if (res.ok) {
                      const manifest = await res.json();
                      // Manifest list / OCI index references child manifests by digest
                      if (manifest.manifests && Array.isArray(manifest.manifests)) {
                        for (const m of manifest.manifests) {
                          if (m.digest) {
                            protectedDigests.add(m.digest);
                          }
                        }
                      }
                    }
                  } catch (e) {
                    core.warning(`Failed to fetch manifest for ${pkg.name}:${tag}: ${e.message}`);
                  }
                }
              }

              core.info(`Package ${pkg.name}: ${protectedDigests.size} protected digest(s).`);

              const untaggedVersions = versions.filter((version) => {
                const tags = version.metadata?.container?.tags || [];
                if (tags.length > 0) return false;
                // Protect untagged versions referenced by tagged manifest lists
                if (protectedDigests.has(version.name)) {
                  core.info(`Package ${pkg.name}: keeping ${version.name} (referenced by tagged version).`);
                  return false;
                }
                return true;
              });

              if (untaggedVersions.length === 0) {
                core.info(`Package ${pkg.name}: no untagged versions.`);
                continue;
              }

              core.info(`Package ${pkg.name}: deleting ${untaggedVersions.length} untagged version(s).`);

              for (const version of untaggedVersions) {
                await github.request(
                  "DELETE /orgs/{org}/packages/{package_type}/{package_name}/versions/{package_version_id}",
                  {
                    org,
                    package_type: packageType,
                    package_name: pkg.name,
                    package_version_id: version.id,
                  }
                );

                deletedVersions += 1;
                core.info(`Deleted ${pkg.name}@${version.id}`);
              }
            }

            core.info(`Cleanup finished. Deleted ${deletedVersions} untagged version(s).`);
